<div class="signUpForm">
<form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="fill">
    <mat-label>Username</mat-label>
    <input matInput placeholder="Enter your username" formControlName="username">
    <mat-error *ngIf="signUpForm.get('username')?.invalid && signUpForm.get('username')?.touched">
      Username is required
    </mat-error>
    <mat-error *ngIf="formErrors">{{formErrors}}</mat-error>
    <div *ngIf="formErrors">username must contain 3 letters/div></div>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Email</mat-label>
    <input matInput type="email" placeholder="Enter your email" formControlName="email">
    <mat-error *ngIf="signUpForm.get('email')?.invalid && signUpForm.get('email')?.touched">
      A valid email is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Password</mat-label>
    <input matInput type="password" placeholder="Enter your password" formControlName="password">
    <mat-error *ngIf="signUpForm.get('password')?.invalid && signUpForm.get('password')?.touched">
      Password is required
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Confirm Password</mat-label>
    <input matInput type="password" placeholder="Confirm Password" formControlName="confirmPassword">
    <mat-error *ngIf="signUpForm.get('confirmPassword')?.invalid && signUpForm.get('confirmPassword')?.touched">
      Password is required
    </mat-error>
  </mat-form-field>

  <button class="signUpBtn" mat-raised-button color="primary" type="submit"  [ngStyle]="{ 'background-color': signUpForm.valid ? 'Green': '', 'color': signUpForm.valid ? 'white': ''}">Sign Up</button>
</form>
</div>
