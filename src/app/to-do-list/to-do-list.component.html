<mat-toolbar color="primary">
    <span>ToDoList section</span>
    <span class="spacer"></span>
    <mat-toolbar color="primary">
              <span class="spacer"></span>  
              <button mat-raised-button class="create-list-btn" (click)="openDialog(dialogTemplate)">
                <span class="icon">➕</span>
                Create new List
              </button>
              
    </mat-toolbar>

    <ng-template #dialogTemplate let-dialogRef="dialogRef">
      <h2 mat-dialog-title>Create List</h2>
      <mat-dialog-content>
          <input matInput [(ngModel)]="dialogInput" (input)="getInput(dialogInput)" />
      </mat-dialog-content>
        <button mat-button mat-dialog-close>Cancel</button>
        <button
          mat-raised-button
          color="primary"
          [disabled]="isDisabled" 
          (click)="onCreateList()" [ngClass]="{ 'active-button': isActive}">
          Create
        </button>
    </ng-template>
