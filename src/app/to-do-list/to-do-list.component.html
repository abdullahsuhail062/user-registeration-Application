<mat-toolbar color="primary">
    <span>ToDoList section</span>
    <span class="spacer"></span>
    <mat-toolbar color="primary">
              <span class="spacer"></span>  
              <button mat-raised-button class="create-list-btn" (click)="openDialog(dialogTemplate)">
                <span class="icon">➕</span>
                Create new List
              </button>
              
    </mat-toolbar>

    <div class="dialog">
    <ng-template #dialogTemplate>
      <mat-dialog-content>
        <input matInput type="text" placeholder="Enter list name">
      </mat-dialog-content>
    </ng-template>
  </div>
